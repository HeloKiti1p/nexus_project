{% extends "base.html" %}
{% load static %}

{% block title %}Лента постов{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12 col-md-8 offset-md-2">
        <h2 class="section-title">Лента постов</h2>

        {% if user.is_authenticated %}
            <div class="d-grid gap-2 mb-4">
                <a href="{% url 'posts:create' %}" class="btn btn-primary">
                    <i class="bi bi-plus-circle me-1"></i>Создать новый пост
                </a>
            </div>
        {% endif %}

        <div class="posts-container">
            {% include 'posts/post_list_items.html' %}
        </div>

        <div id="scroll-trigger" style="height: 10px;"></div>
    </div>
</div>

<script src="{% static 'js/infinite_scroll.js' %}"></script>
<script src="{% static 'js/likes.js' %}"></script>
{% endblock %}
