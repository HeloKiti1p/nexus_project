<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nexus{% endblock %}</title>
    {% load static %}
    <!-- Bootstrap Icons (оставляем, они не конфликтуют) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Твой собственный CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <!-- Bootstrap JS (для dropdown, пока оставим) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>
</head>
<body>
    <!-- Шапка с твоими классами -->
    <header>
        <div class="header-container">
            <a href="{% url 'posts:list' %}" class="logo">Nexus</a>
            <nav class="nav-links">
                {% if user.is_authenticated %}
                    <!-- Выпадающее меню (временно на Bootstrap) -->
                    <div class="dropdown" style="display: inline-block;">
                        <a class="dropdown-toggle d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown" style="color: white; text-decoration: none;">
                            {% if user.avatar %}
                                <img src="{{ user.avatar.url }}" alt="Аватар" class="rounded-circle me-1" style="width: 30px; height: 30px; object-fit: cover;">
                            {% else %}
                                <i class="bi bi-person-circle me-1" style="font-size: 1.8rem;"></i>
                            {% endif %}
                            <span>{{ user.username }}</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="{% url 'users:profile' user.username %}"><i class="bi bi-person me-2"></i>Мой профиль</a></li>
                            <li><a class="dropdown-item" href="{% url 'users:logout' %}"><i class="bi bi-box-arrow-right me-2"></i>Выйти</a></li>
                        </ul>
                    </div>
                {% else %}
                    <a href="{% url 'users:login' %}"><i class="bi bi-box-arrow-in-right me-1"></i>Войти</a>
                    <a href="{% url 'users:register' %}"><i class="bi bi-person-plus me-1"></i>Регистрация</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <!-- Основной контейнер с твоим классом -->
    <main class="container">
        {% block content %}
        <!-- Уникальное содержимое страниц -->
        {% endblock %}
    </main>

    <!-- Подвал (можно стилизовать позже) -->
    <footer class="bg-light text-center text-muted py-3 mt-5">
        <div class="container">
            <p>2026 Реализация соц.сети Nexus</p>
        </div>
    </footer>
</body>
</html>
